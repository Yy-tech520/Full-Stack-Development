<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户注册表单测试</title>
</head>

<body>
  <header>
    <h1>用户注册</h1>
  </header>

  <main>
    <section>
      <form action="/register" method="post">
        <fieldset>
          <legend>注册信息</legend>

          <div>
            <label for="username">用户名：</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
          </div>

          <div>
            <label for="password">密码：</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
          </div>

          <div>
            <label for="confirmPassword">确认密码：</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请确认密码" required>
          </div>

          <div>
            <label for="phoneNumber">手机号：</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="请输入手机号" required pattern="^1[3-9]\d{9}$">
          </div>

          <div>
            <label for="verificationCode">验证码：</label>
            <input type="text" id="verificationCode" name="verificationCode" placeholder="请输入验证码" required>
            <button type="button">获取验证码</button>
          </div>

          <div>
            <button type="submit">注册提交</button>
          </div>
        </fieldset>
      </form>
    </section>
  </main>

  <footer>
    <p>已有账号？<a href="#">去登录</a></p>
  </footer>
</body>

</html>
