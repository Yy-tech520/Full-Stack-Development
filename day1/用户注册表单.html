<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户注册表单测试</title>
</head>

<body>
  <header>
    <h1>用户注册</h1>
  </header>

  <main>
    <section>
      <form action="/register" method="post">
        <fieldset>
          <legend>注册信息</legend>

          <div>
            <label for="username">用户名：</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名">
          </div>

          <div>
            <label for="password">密码：</label>
            <input type="password" id="password" name="password" placeholder="请输入密码">
          </div>

          <div>
            <label for="confirmPassword">确认密码：</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="请确认密码">
          </div>

          <div>
            <label for="phoneNumber">手机号：</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="请输入手机号" pattern="^1[3-9]\d{9}$">
          </div>

          <div>
            <label for="verificationCode">验证码：</label>
            <input type="text" id="verificationCode" name="verificationCode" placeholder="请输入验证码">
            <button type="button">获取验证码</button>
          </div>

          <div>
            <button type="submit">注册提交</button>
          </div>
        </fieldset>
      </form>
    </section>
  </main>

  <footer>
    <p>已有账号？<a href="#">去登录</a></p>
  </footer>

  <script>
    const form = document.querySelector('form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const phoneNumberInput = document.getElementById('phoneNumber');
    const verificationCodeInput = document.getElementById('verificationCode');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const username = usernameInput.value.trim();
      const password = passwordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();
      const phoneNumber = phoneNumberInput.value.trim();
      const verificationCode = verificationCodeInput.value.trim();

      if (!username) {
        alert('用户名不能为空');
        return;
      }
      if (!password) {
        alert('密码不能为空');
        return;
      }
      if (!confirmPassword) {
        alert('确认密码不能为空');
        return;
      }
      if (!phoneNumber) {
        alert('手机号不能为空');
        return;
      }
      if (!verificationCode) {
        alert('验证码不能为空');
        return;
      }
      if (password !== confirmPassword) {
        alert('两次密码不一致');
        return;
      }

      const formData = {
        username,
        password,
        confirmPassword,
        phoneNumber,
        verificationCode
      }
      console.log(formData);

      alert('注册成功');
      form.reset();
    });
  </script>
</body>

</html>
